# Azure DevOps Pipeline - Complete CI/CD
# Combines validation (CI) with deployment (CD) using Databricks Bundles

name: mktg-next-ads-ci-cd-$(Build.SourceVersion)-$(Date:yyyyMMdd)$(Rev:.r)

trigger: none # all manual for now

parameters:
  - name: destroyBundle
    type: boolean
    default: "false"
    displayName: 'Delete DAB resources'
  - name: recreateDevIntegrationTables
    type: boolean
    default: "false"
    displayName: 'Recreate DEV integration tables'

variables:
  - template: devops/variables/common.yml

stages:
  - stage: CI
    displayName: 'Continuous Integration'
    variables:
    - group: Development
    jobs:
      - template: devops/templates/run-tests.yml
        parameters:
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_dev)
          azureSubscription: $(serviceConnectionName_dev)
          KeyVaultName: $(strKeyVaultName)
          testType: 'unit'
          target: 'DEV'
          databricksClusterId: $(DATABRICKS_CLUSTER_ID_15_4)

  - stage: IntegrationTests
    displayName: 'Integration Tests on PROD'
    variables:
    - group: Production
    dependsOn: [] # to run in parallel with CI
    jobs:
      - template: devops/templates/run-tests.yml
        parameters:
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_prod)
          azureSubscription: $(serviceConnectionName_prod)
          KeyVaultName: $(strKeyVaultName)
          testType: 'integration'
          target: 'PROD'
          databricksClusterId: $(DATABRICKS_CLUSTER_ID_15_4)

  - stage: DestroyDEV
    displayName: 'Destroy DEV'
    dependsOn:
      - CI
      - IntegrationTests
    condition: eq('${{ parameters.destroyBundle }}', 'true')
    variables:
    - group: Development
    jobs:
      - template: devops/templates/destroy-dab.yml
        parameters:
          target: 'DEV'
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_dev)
          azureSubscription: $(serviceConnectionName_dev)
          KeyVaultName: $(strKeyVaultName)

  - stage: DeployDEV
    displayName: 'Deploy to DEV'
    dependsOn:
      - CI
      - IntegrationTests
      - DestroyDEV
    variables:
    - group: Development
    jobs:
      - template: devops/templates/deploy-dab.yml
        parameters:
          target: 'DEV'
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_dev)
          azureSubscription: $(serviceConnectionName_dev)
          KeyVaultName: $(strKeyVaultName)

  - stage: DestroyDEVIntegration
    displayName: 'Destroy DEV Integration'
    dependsOn:
      - CI
      - IntegrationTests
    condition: and(succeeded(), eq('${{ parameters.destroyBundle }}', 'true'), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    variables:
    - group: Development
    jobs:
      - template: devops/templates/destroy-dab.yml
        parameters:
          target: 'DEV_INTEGRATION'
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_dev)
          azureSubscription: $(serviceConnectionName_dev)
          KeyVaultName: $(strKeyVaultName)

  - stage: DeployDEVIntegration
    displayName: 'Deploy DEV Integration'
    dependsOn:
      - CI
      - IntegrationTests
      - DestroyDEVIntegration
    condition: and(not(failed()), not(canceled()), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    variables:
    - group: Development
    jobs:
      - template: devops/templates/deploy-dab.yml
        parameters:
          target: 'DEV_INTEGRATION'
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_dev)
          azureSubscription: $(serviceConnectionName_dev)
          KeyVaultName: $(strKeyVaultName)

  - stage: InitializeDEVIntegrationTables
    displayName: 'Initialize DEV Integration Tables'
    dependsOn:
      - DeployDEVIntegration
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/develop'))
    variables:
    - group: Development
    jobs:
      - job: RunDEVIntegrationSetup
        displayName: 'Run DEV integration table setup'
        pool:
          name: $(agentpool_dev)
          vmImage: ubuntu-latest
        steps:
          - task: AzureKeyVault@2
            inputs:
              azureSubscription: $(serviceConnectionName_dev)
              KeyVaultName: $(strKeyVaultName)
              SecretsFilter: "Databricks-Spn-MarketingData-ClientId,Databricks-Spn-MarketingData-SecretValue"
              RunAsPreJob: true
            displayName: 'Fetch secrets from Key Vault'

          - script: |
              bash devops/scripts/install_databricks_cli.sh
            displayName: 'Install Databricks CLI'
            env:
              DATABRICKS_HOST: $(DATABRICKS_HOST)
              DATABRICKS_CLIENT_ID: $(Databricks-Spn-MarketingData-ClientId)
              DATABRICKS_CLIENT_SECRET: $(Databricks-Spn-MarketingData-SecretValue)

          - script: |
              echo "Running DEV integration table setup..."
              unset DATABRICKS_CLUSTER_ID
              source devops/scripts/set_dab_vars.sh
              if [ '${{ parameters.recreateDevIntegrationTables }}' = 'true' ]; then
                echo "Recreating DEV integration tables before setup..."
                databricks bundle run mktg_next_uk_nextads_dev_integration_migrate -t DEV_INTEGRATION
              else
                databricks bundle run mktg_next_uk_nextads_dev_integration_setup -t DEV_INTEGRATION
              fi
            displayName: 'Create missing DEV integration tables'

  - stage: DestroyPREPROD
    displayName: 'Destroy PREPROD'
    condition: eq('${{ parameters.destroyBundle }}', 'true')
    variables:
    - group: Production
    jobs:
      - template: devops/templates/destroy-dab.yml
        parameters:
          target: 'PREPROD'
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_prod)
          azureSubscription: $(serviceConnectionName_prod)
          KeyVaultName: $(strKeyVaultName)

  - stage: DeployPREPROD
    displayName: 'Deploy PREPROD to PROD'
    dependsOn: 
      - DeployDEV
      - DestroyPREPROD
    condition: succeeded()
    variables:
    - group: Production
    jobs:
      - template: devops/templates/deploy-dab.yml
        parameters:
          target: 'PREPROD'
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_prod)
          azureSubscription: $(serviceConnectionName_prod)
          KeyVaultName: $(strKeyVaultName)

  - stage: DestroyPROD
    displayName: 'Destroy PROD'
    condition: eq('${{ parameters.destroyBundle }}', 'true')
    variables:
    - group: Production
    jobs:
      - template: devops/templates/destroy-dab.yml
        parameters:
          target: 'PROD'
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_prod)
          azureSubscription: $(serviceConnectionName_prod)
          KeyVaultName: $(strKeyVaultName)

  - stage: DeployPROD
    displayName: 'Deploy to PROD'
    dependsOn: 
      - DeployPREPROD
      - DestroyPROD
    condition: succeeded()
    variables:
    - group: Production
    jobs:
      - template: devops/templates/deploy-dab.yml
        parameters:
          target: 'PROD'
          pythonVersion: $(PYTHON_VERSION)
          AzureBuildAgentPool: $(agentpool_prod)
          azureSubscription: $(serviceConnectionName_prod)
          KeyVaultName: $(strKeyVaultName)
