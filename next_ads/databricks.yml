# This is a Databricks asset bundle definition for next_ads.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: next_ads

include:
  - resources/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-6188831950334199.19.azuredatabricks.net

  prod:
    mode: production
    workspace:
      host: https://adb-6188831950334199.19.azuredatabricks.net
      # We explicitly specify /Users/tom_corke@next.co.uk to make sure we only have a single copy.
      root_path: /Users/tom_corke@next.co.uk/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: tom_corke@next.co.uk
        level: CAN_MANAGE
    run_as:
      user_name: tom_corke@next.co.uk
