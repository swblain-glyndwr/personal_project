[project]
name = "next_ads"
version = "2.0.0"
description = "Personalised allocation of Ads on the Next website and app."
authors = [
    {name = "Tom Corke",email = "tom_corke@next.co.uk"},
    {name = "Ted Taylor",email = "edward_taylor@next.co.uk"}
]
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "ipykernel (==6.29.5)",
    "databricks-connect (==15.4.2)",
    "gspread (==6.1.2)",
    "pytest (>=8.3.3)",
]


[build-system]
requires = ["poetry-core>=2.0.0,<3.0.0"]
build-backend = "poetry.core.masonry.api"

[tool.poetry.group.dev.dependencies]
plotly = "^6.3.1"
networkx = "^3.5"

[tool.ruff.format]
quote-style = "double"
