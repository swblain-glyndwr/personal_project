# This is a Databricks asset bundle definition for next-ads.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: next-ads

include:
  - resources/jobs/mktg_next_uk_nextads.yml
  - resources/jobs/mktg_next_uk_nextads_page_build.yml
  - resources/jobs/mktg_next_uk_nextads_masid_handoff.yml
  - resources/jobs/mktg_next_uk_nextads_payload_export.yml
  - resources/jobs/mktg_next_uk_nextads_plp_gs_delivery.yml
  - resources/jobs/mktg_next_uk_nextads_realtime_inputs.yml
  - resources/jobs/mktg_next_uk_nextads_theme_affinity.yml
  - resources/jobs/mktg_next_uk_nextads_theme_affinity_model_train.yml
  - resources/jobs/mktg_next_uk_nextads_theme_affinity_model_train_spark.yml
  - resources/jobs/mktg_next_uk_nextads_theme_affinity_model_monitor.yml
  - resources/jobs/mktg_next_uk_nextads_theme_affinity_quality_monitor_setup.yml
  - resources/jobs/mktg_next_uk_nextads_theme_affinity_model_import_dev.yml
  - resources/jobs/mktg_next_uk_nextads_theme_affinity_model_promote.yml
  - resources/jobs/mktg_next_uk_nextads_qa.yml
  - resources/pipelines/mktg_next_uk_nextads_predict_data_prep.yml
  - resources/variables/clusters.yml
  - resources/variables/libraries.yml
  - resources/jobs/mktg_next_uk_nextads_results.yml
  - resources/jobs/mktg_next_uk_nextads_realtime_results.yml
  - resources/jobs/table_size_monitoring.yml
  - resources/jobs/dev_setup.yml
  - resources/jobs/dev_integration_setup.yml
  - resources/jobs/preprod_setup.yml
  - resources/jobs/preprod_dependency_smoke.yml
  - resources/jobs/prod_table_contract_smoke.yml
  - resources/jobs/mktg_next_uk_nextads_feature_store.yml

sync:
  include:
    - configs/**
    - jobs/**
    - next_ads/**
    - next_ads/data/**
    - scripts/**
    - sql/**
    - src/next_ads/**
    - src/next_ads/data/**
    - jobs/features/**
    - configs/features/**
    - sql/features/**
  exclude:
    - notebooks/

variables:
  environment_name:
    description: the target environment for deployment
    default: dev
  job_parameter_environment_name:
    description: Job environment parameter passed to tasks; PREPROD uses preprod to run in the PROD workspace while writing validation outputs outside warehouse
    default: dev
  user_schema:
    description: User-specific schema for dev environment (derived from current user)
    default: ${workspace.current_user.short_name}
  job_cluster_policy_id:
    description: policy id for job clusters
    default: 00076A5E6270EA99
  job_cluster_policy_id_fixed:
    description: policy id for fixed job clusters
    default: 00094FE740FAEA3D
  job_cluster_lp_policy_id:
    description: policy id for Lakeflow pipeline clusters
    default: 000CC98093ABF8DC
  run_as_SPN_name:
    description: the name of the service principal identity that will deploy the bundle
    default: 7ecc733a-4b66-4783-b984-985333d55c38
  mktgdata_catalog:
    description: the name of the marketing unity catalog we are using, e.g. marketingdata_prod
    default: marketingdata_dev
  theme_affinity_model_uri:
    description: MLflow model URI used by the Theme Affinity prediction task
    default: models:/marketingdata_prod.ds_sandbox.nextads_hackathon_model/1
  theme_affinity_reference_date:
    description: Reference date for Theme Affinity data prep. Use current for the operational daily run, or YYYY-MM-DD for an explicit backfill date.
    default: current
  deploy_timestamp:
    description: Deployment timestamp
    default: "unknown"
  git_commit_sha:
    description: Git commit SHA for tracking
    default: "unknown"
  git_branch:
    description: Git branch name
    default: "unknown"
  git_last_commit_user_name:
    description: Username of the last git commit author, e.g. 'john_doe'
    default: ${workspace.current_user.userName}
  deployed_by:
    description: Deployed by user, e.g. 'Doe, John'
    default: ${workspace.current_user.userName}
  data_team_notification_emails:
    description: Internal data team owners for core build and QA failure notifications
    default: []
  reporting_notification_emails:
    description: Reporting owners for results job failure notifications
    default: []
  data_and_downstream_notification_emails:
    description: Combined data team and downstream recipients for handoff and export failure notifications
    default: []
  feature_store_reference_date:
    description: Reference date for opt-in feature-store smoke/materialisation jobs
    default: predict
  feature_store_schema:
    description: Schema for opt-in Next Ads Feature Store tables
    default: nextads_feature_store
  feature_store_source_catalog:
    description: Catalog for stable Next Ads source tables consumed by feature-store materialisation
    default: marketingdata_prod
  feature_store_source_schema:
    description: Schema for stable Next Ads source tables consumed by feature-store materialisation
    default: warehouse
  feature_store_theme_source_catalog:
    description: Catalog for existing Theme Affinity source tables consumed by feature-store materialisation
    default: marketingdata_prod
  feature_store_theme_source_schema:
    description: Schema for existing Theme Affinity source tables consumed by feature-store materialisation
    default: warehouse
  feature_store_theme_table_prefix:
    description: Table prefix for Theme Affinity runtime source tables consumed by feature-store materialisation
    default: next_uk_nextads_theme_affinity_predict
  feature_store_theme_training_reference_date:
    description: Historical reference date for labelled Theme Affinity training input materialisation; set to skip for normal latest-feature refreshes
    default: skip
  feature_store_theme_training_table_prefix:
    description: Staging table prefix used when creating labelled Theme Affinity training input from historical prep
    default: next_uk_nextads_theme_affinity_training
  theme_affinity_training_input_table:
    description: Theme Affinity labelled training input table for DEV model-building jobs
    default: ""

targets:
  SANDBOX:
    mode: development
    default: true
    presets:
      name_prefix: "[${bundle.target} ${workspace.current_user.short_name}] "
      trigger_pause_status: PAUSED
    workspace:
      host: https://adb-6694370232251359.19.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - level: CAN_MANAGE
        group_name: AzUsers-DBK-MarketingData-Contributor-Dev
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Dev
      - level: CAN_MANAGE
        service_principal_name: ${var.run_as_SPN_name}
      - level: CAN_RUN
        group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Dev
    run_as:
      user_name: ${workspace.current_user.userName}
    variables:
      mktgdata_catalog: marketingdata_dev
      environment_name: dev
      job_cluster_policy_id: 00076A5E6270EA99
      job_cluster_policy_id_fixed: 00094FE740FAEA3D
      job_cluster_lp_policy_id: 000CC98093ABF8DC
      run_as_SPN_name: 7ecc733a-4b66-4783-b984-985333d55c38
      job_parameter_environment_name: dev
      feature_store_schema: ${workspace.current_user.short_name}

  # deployed with cicd SPN but with user schema derived from last git commit author to avoid collision of user schemas in dev when multiple developers are deploying
  DEV:
    mode: development
    presets:
      name_prefix: "[${bundle.target} ${workspace.current_user.short_name} as ${var.git_last_commit_user_name}] "
      trigger_pause_status: PAUSED
    workspace:
      host: https://adb-6694370232251359.19.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/${var.git_last_commit_user_name}
    permissions:
      - level: CAN_MANAGE
        group_name: AzUsers-DBK-MarketingData-Contributor-Dev
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Dev
      - level: CAN_MANAGE
        service_principal_name: ${var.run_as_SPN_name}
      - level: CAN_RUN
        group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Dev
    run_as:
      service_principal_name: ${var.run_as_SPN_name}
    variables:
      mktgdata_catalog: marketingdata_dev
      environment_name: dev
      job_cluster_policy_id: 00076A5E6270EA99
      job_cluster_lp_policy_id: 000CC98093ABF8DC
      run_as_SPN_name: 7ecc733a-4b66-4783-b984-985333d55c38
      job_parameter_environment_name: dev
      # override user schema to last git commit author for dev environment, this is because for DEV deployment the SP would be the user and we want to avoid collision of user schemas in dev when multiple developers are deploying.
      user_schema: ${var.git_last_commit_user_name}
      feature_store_schema: ${var.git_last_commit_user_name}
      theme_affinity_training_input_table: marketingdata_dev.nextads_feature_store.next_uk_nextads_fs_theme_affinity_training_input

  # Shared integration target for code merged to develop.
  # This validates combined team changes in marketingdata_dev.nextads_integration.
  DEV_INTEGRATION:
    mode: production
    presets:
      name_prefix: "[${bundle.target}] "
      trigger_pause_status: PAUSED
    workspace:
      host: https://adb-6694370232251359.19.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - level: CAN_MANAGE
        group_name: AzUsers-DBK-MarketingData-Contributor-Dev
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Dev
      - level: CAN_MANAGE
        service_principal_name: ${var.run_as_SPN_name}
      - level: CAN_RUN
        group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Dev
    run_as:
      service_principal_name: ${var.run_as_SPN_name}
    variables:
      mktgdata_catalog: marketingdata_dev
      environment_name: dev
      job_cluster_policy_id: 00076A5E6270EA99
      job_cluster_policy_id_fixed: 00094FE740FAEA3D
      job_cluster_lp_policy_id: 000CC98093ABF8DC
      run_as_SPN_name: 7ecc733a-4b66-4783-b984-985333d55c38
      job_parameter_environment_name: dev
      user_schema: nextads_integration
      feature_store_schema: nextads_integration
      feature_store_theme_source_catalog: marketingdata_dev
      feature_store_theme_source_schema: nextads_integration
      theme_affinity_training_input_table: marketingdata_dev.nextads_feature_store.next_uk_nextads_fs_theme_affinity_training_input

  # Shared DEV feature-store target for scheduled model-building features.
  DEV_FEATURE_STORE:
    mode: production
    presets:
      name_prefix: "[${bundle.target}] "
      trigger_pause_status: PAUSED
    workspace:
      host: https://adb-6694370232251359.19.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - level: CAN_MANAGE
        group_name: AzUsers-DBK-MarketingData-Contributor-Dev
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Dev
      - level: CAN_MANAGE
        service_principal_name: ${var.run_as_SPN_name}
      - level: CAN_RUN
        group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Dev
    run_as:
      service_principal_name: ${var.run_as_SPN_name}
    variables:
      mktgdata_catalog: marketingdata_dev
      environment_name: dev
      job_cluster_policy_id: 00076A5E6270EA99
      job_cluster_policy_id_fixed: 00094FE740FAEA3D
      job_cluster_lp_policy_id: 000CC98093ABF8DC
      run_as_SPN_name: 7ecc733a-4b66-4783-b984-985333d55c38
      job_parameter_environment_name: dev
      user_schema: nextads_feature_store
      feature_store_schema: nextads_feature_store
      feature_store_source_catalog: marketingdata_prod
      feature_store_source_schema: warehouse
      feature_store_theme_source_catalog: marketingdata_prod
      feature_store_theme_source_schema: warehouse
      theme_affinity_training_input_table: marketingdata_dev.nextads_feature_store.next_uk_nextads_fs_theme_affinity_training_input

  # PREPROD:
