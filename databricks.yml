# This is a Databricks asset bundle definition for next-ads.
# The Databricks extension requires databricks.yml configuration file.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.

bundle:
  name: next-ads

include:
  - resources/jobs/mktg_next_uk_nextads.yml
  - resources/variables/clusters.yml
  - resources/variables/libraries.yml
  - resources/jobs/mktg_next_uk_nextads_results.yml
  - resources/jobs/mktg_next_uk_nextads_realtime_results.yml
  - resources/jobs/table_size_monitoring.yml

sync:
  exclude:
    - notebooks/

variables:
  environment_name:
    description: the target environment for deployment
    default: dev
  job_parameter_environment_name:
    description: Job environment parameter passed to tasks; PREPROD uses preprod to run in the PROD workspace while writing validation outputs outside warehouse
    default: dev
  user_schema:
    description: User-specific schema for dev environment (derived from current user)
    default: ${workspace.current_user.short_name}
  job_cluster_policy_id:
    description: policy id for job clusters
    default: 00076A5E6270EA99
  job_cluster_policy_id_fixed:
    description: policy id for fixed job clusters
    default: 00094FE740FAEA3D
  run_as_SPN_name:
    description: the name of the service principal identity that will deploy the bundle
    default: 7ecc733a-4b66-4783-b984-985333d55c38
  mktgdata_catalog:
    description: the name of the marketing unity catalog we are using, e.g. marketingdata_prod
    default: marketingdata_dev
  deploy_timestamp:
    description: Deployment timestamp
    default: "unknown"
  git_commit_sha:
    description: Git commit SHA for tracking
    default: "unknown"
  git_branch:
    description: Git branch name
    default: "unknown"
  git_last_commit_user_name:
    description: Username of the last git commit author, e.g. 'john_doe'
    default: ${workspace.current_user.userName}
  deployed_by:
    description: Deployed by user, e.g. 'Doe, John'
    default: ${workspace.current_user.userName}
  notification_emails:
    description: Email addresses for job failure notifications
    default: []

targets:
  SANDBOX:
    mode: development
    default: true
    presets:
      name_prefix: "[${bundle.target} ${workspace.current_user.short_name}] "
      trigger_pause_status: PAUSED
    workspace:
      host: https://adb-6694370232251359.19.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - level: CAN_MANAGE
        group_name: AzUsers-DBK-MarketingData-Contributor-Dev
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Dev
      - level: CAN_MANAGE
        service_principal_name: ${var.run_as_SPN_name}
      - level: CAN_RUN
        group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Dev
    run_as:
      user_name: ${workspace.current_user.userName}
    variables:
      mktgdata_catalog: marketingdata_dev
      environment_name: dev
      job_cluster_policy_id: 00076A5E6270EA99
      job_cluster_policy_id_fixed: 00094FE740FAEA3D
      run_as_SPN_name: 7ecc733a-4b66-4783-b984-985333d55c38
      job_parameter_environment_name: dev

  # deployed with cicd SPN but with user schema derived from last git commit author to avoid collision of user schemas in dev when multiple developers are deploying
  DEV:
    mode: development
    presets:
      name_prefix: "[${bundle.target} ${workspace.current_user.short_name} as ${var.git_last_commit_user_name}] "
      trigger_pause_status: PAUSED
    workspace:
      host: https://adb-6694370232251359.19.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}/${var.git_last_commit_user_name}
    permissions:
      - level: CAN_MANAGE
        group_name: AzUsers-DBK-MarketingData-Contributor-Dev
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Dev
      - level: CAN_MANAGE
        service_principal_name: ${var.run_as_SPN_name}
      - level: CAN_RUN
        group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Dev
    run_as:
      service_principal_name: ${var.run_as_SPN_name}
    variables:
      mktgdata_catalog: marketingdata_dev
      environment_name: dev
      job_cluster_policy_id: 00076A5E6270EA99
      run_as_SPN_name: 7ecc733a-4b66-4783-b984-985333d55c38
      job_parameter_environment_name: dev
      # override user schema to last git commit author for dev environment, this is because for DEV deployment the SP would be the user and we want to avoid collision of user schemas in dev when multiple developers are deploying.
      user_schema: ${var.git_last_commit_user_name}

  # Shared integration target for code merged to develop.
  # This validates combined team changes in marketingdata_dev.nextads_integration.
  DEV_INTEGRATION:
    mode: production
    presets:
      name_prefix: "[${bundle.target}] "
      trigger_pause_status: PAUSED
    workspace:
      host: https://adb-6694370232251359.19.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - level: CAN_MANAGE
        group_name: AzUsers-DBK-MarketingData-Contributor-Dev
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Dev
      - level: CAN_MANAGE
        service_principal_name: ${var.run_as_SPN_name}
      - level: CAN_RUN
        group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Dev
    run_as:
      service_principal_name: ${var.run_as_SPN_name}
    variables:
      mktgdata_catalog: marketingdata_dev
      environment_name: dev
      job_cluster_policy_id: 00076A5E6270EA99
      job_cluster_policy_id_fixed: 00094FE740FAEA3D
      run_as_SPN_name: 7ecc733a-4b66-4783-b984-985333d55c38
      job_parameter_environment_name: dev
      user_schema: nextads_integration

  # PREPROD:
  #   # intended to deploy as in prod simulating prod, in prod mode etc.
  #   mode: production
  #   workspace:
  #     host: https://adb-4528631188614244.4.azuredatabricks.net/
  #     # root_path: /root/MarketingData/DABs/${bundle.name}/.bundle/
  #   permissions:
  #   - level: CAN_MANAGE
  #     group_name: AzUsers-DBK-MarketingData-Contributor-PreProd
  # variables:
  #       mktgdata_catalog: marketingdata_dev

  # PREPROD on PROD
  PREPROD:
    # intended to deploy as in prod simulating prod, in prod mode etc.
    mode: development
    presets:
      name_prefix: "[${bundle.target} ${workspace.current_user.short_name}] "
      trigger_pause_status: PAUSED
    workspace:
      host: https://adb-6188831950334199.19.azuredatabricks.net/
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - level: CAN_MANAGE
        service_principal_name: ${var.run_as_SPN_name}
      - level: CAN_RUN
        group_name: AzUsers-DBK-MarketingData-Contributor-Prod
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Prod
      - level: CAN_VIEW
        group_name: AzUsers-DBK-MarketingData-Viewer-Prod
      - level: CAN_MANAGE
        group_name: AzUsers-AADPAG-DBK-MKT-WorkspaceContributor-Prod
      - level: CAN_MANAGE
        group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Prod
    run_as:
      service_principal_name: ${var.run_as_SPN_name}
    variables:
      mktgdata_catalog: marketingdata_prod
      environment_name: prod
      job_cluster_policy_id: 0019C79D3B6399F0
      job_cluster_policy_id_fixed: 0007D38BE4B60771
      run_as_SPN_name: 2be8d1c2-d35b-4438-891e-558b9b5880f6
      job_parameter_environment_name: preprod

  PROD:
    mode: production
    # git:
    #   branch: main
    presets:
      trigger_pause_status: UNPAUSED
    workspace:
      host: https://adb-6188831950334199.19.azuredatabricks.net/
      root_path: /root/MarketingData/DABs/${bundle.name}/.bundle/
    permissions:
    - level: CAN_MANAGE
      service_principal_name: ${var.run_as_SPN_name}
    - level: CAN_RUN      
      group_name: AzUsers-DBK-MarketingData-Contributor-Prod
    - level: CAN_MANAGE
      group_name: AzUsers-AADPAG-DBK-MKT-CatalogContributor-Prod
    - level: CAN_VIEW
      group_name: AzUsers-DBK-MarketingData-Viewer-Prod
    - level: CAN_MANAGE
      group_name: AzUsers-AADPAG-DBK-MKT-WorkspaceContributor-Prod
    - level: CAN_RUN
      group_name: AzUsers-DBK-MarketingData-DSSchemaContributor-Prod
    - level: CAN_MANAGE
      user_name: edward_taylor@next.co.uk
    - level: CAN_MANAGE
      user_name: thomas_lynch@next.co.uk
    - level: CAN_MANAGE
      user_name: claire_wilsonbarnes@next.co.uk
    run_as:
      service_principal_name: ${var.run_as_SPN_name}
    variables:
      mktgdata_catalog: marketingdata_prod
      environment_name: prod
      job_cluster_policy_id: 0019C79D3B6399F0
      job_cluster_policy_id_fixed: 0007D38BE4B60771
      run_as_SPN_name: 2be8d1c2-d35b-4438-891e-558b9b5880f6
      job_parameter_environment_name: prod
