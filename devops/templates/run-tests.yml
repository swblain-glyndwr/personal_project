parameters:
  - name: target
    type: string
    default: 'DEV'
  - name: pythonVersion
    type: string
    default: '3.11'
  - name: AzureBuildAgentPool
    type: string
  - name: azureSubscription
    type: string
  - name: KeyVaultName
    type: string
  - name: testType
    type: string
    default: 'unit'
    values:
      - unit
      - integration
      - all
    displayName: 'Test type to run'

jobs:
  - job: RunTests
    displayName: 'Run ${{ parameters.testType }} Tests with Poetry'
    pool:
      name: '${{parameters.AzureBuildAgentPool}}'
      vmImage: ubuntu-latest
    steps:
      - task: UsePythonVersion@0
        inputs:
          versionSpec: ${{ parameters.pythonVersion }}
        displayName: 'Set up Python ${{ parameters.pythonVersion }}'

      - script: |
          python -m pip install --upgrade pip poetry==2.2.1
          poetry --version
          poetry install
        displayName: 'Install Poetry and dependencies'

      - task: AzureKeyVault@2
        inputs:
          azureSubscription: ${{ parameters.azureSubscription }}
          KeyVaultName: ${{ parameters.KeyVaultName }}
          SecretsFilter: "Databricks-Spn-MarketingData-ClientId,Databricks-Spn-MarketingData-SecretValue"
          RunAsPreJob: true
        displayName: 'Fetch secrets from Key Vault'

      - script: |
          bash devops/scripts/install_databricks_cli.sh
        displayName: 'Install Databricks CLI'
        env:
          DATABRICKS_HOST: $(DATABRICKS_HOST)
          DATABRICKS_CLIENT_ID: $(Databricks-Spn-MarketingData-ClientId)
          DATABRICKS_CLIENT_SECRET: $(Databricks-Spn-MarketingData-SecretValue)

      - bash: |
          bash devops/scripts/start_db_cluster.sh $(DATABRICKS_CLUSTER_ID) ${{ parameters.target }}
        name: start_test_cluster
        displayName: Start the testing cluster
        # env:
        #   DATABRICKS_CLUSTER_ID: $(DATABRICKS_CLUSTER_ID)

      - bash: |
          # Determine test path based on parameter
          if [ "${{ parameters.testType }}" = "unit" ]; then
            TEST_PATH="tests/unit/"
            echo "Running UNIT tests from: $TEST_PATH"
          elif [ "${{ parameters.testType }}" = "integration" ]; then
            TEST_PATH="tests/integration/"
            echo "Running INTEGRATION tests from: $TEST_PATH"
          else
            TEST_PATH="tests/"
            echo "Running ALL tests from: $TEST_PATH"
          fi
          
          # Run pytest with selected path
          poetry run pytest $TEST_PATH -v --junitxml=junit/test-results.xml
        name: run_tests
        displayName: Run Python ${{ parameters.testType }} Tests
        continueOnError: true
        env:
          DATABRICKS_HOST: $(DATABRICKS_HOST)
          DATABRICKS_CLIENT_ID: $(Databricks-Spn-MarketingData-ClientId)
          DATABRICKS_CLIENT_SECRET: $(Databricks-Spn-MarketingData-SecretValue)
          DATABRICKS_CLUSTER_ID: $(DATABRICKS_CLUSTER_ID)

      - task: PublishTestResults@2
        condition: succeededOrFailed()
        inputs:
          testResultsFiles: 'junit/test-results.xml'
          testRunTitle: 'Python ${{ parameters.testType }} Tests'
          mergeTestResults: true
        displayName: 'Publish test results'

      - script: |
          echo "Linting Python code..."
          poetry run ruff check || echo "⚠️  Formatting issues"
        displayName: 'Lint code'
        condition: |
          and(
            succeededOrFailed(),
            or(
              eq('${{ parameters.testType }}', 'unit'),
              eq('${{ parameters.testType }}', 'all')
            )
          )
        continueOnError: true

      # - task: PublishCodeCoverageResults@1
      #   condition: succeededOrFailed()
      #   inputs:
      #     codeCoverageTool: Cobertura
      #     summaryFileLocation: '$(System.DefaultWorkingDirectory)/**/coverage.xml'
      #   displayName: 'Publish code coverage'