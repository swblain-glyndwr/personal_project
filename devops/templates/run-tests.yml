parameters:
  - name: target
    type: string
    default: 'DEV'
  - name: pythonVersion
    type: string
    default: '3.11'
  - name: AzureBuildAgentPool
    type: string
  - name: azureSubscription
    type: string
  - name: KeyVaultName
    type: string
  - name: testType
    type: string
    default: 'unit'
    values:
      - unit
      - integration
      - all
    displayName: 'Test type to run'
  - name: databricksClusterId
    type: string
  - name: continueOnError
    type: boolean
    default: true

jobs:
  - job: RunTests
    displayName: 'Run ${{ parameters.testType }} Tests with Poetry'
    pool:
      name: '${{ parameters.AzureBuildAgentPool }}'
      vmImage: ubuntu-latest
    steps:
      - checkout: self
        fetchDepth: 0

      - task: UsePythonVersion@0
        inputs:
          versionSpec: ${{ parameters.pythonVersion }}
        displayName: 'Set up Python ${{ parameters.pythonVersion }}'

      - script: |
          python -m pip install --upgrade pip poetry==2.2.1
          poetry --version
          # configuration doesn't require username so use anything as username
          poetry config http-basic.MarketingDataFeed anything $(System.AccessToken)
          poetry install
        displayName: 'Install Poetry and dependencies'

      - task: AzureKeyVault@2
        inputs:
          azureSubscription: ${{ parameters.azureSubscription }}
          KeyVaultName: ${{ parameters.KeyVaultName }}
          SecretsFilter: "Databricks-Spn-MarketingData-ClientId,Databricks-Spn-MarketingData-SecretValue"
          RunAsPreJob: true
        displayName: 'Fetch secrets from Key Vault'

      - script: |
          bash devops/scripts/install_databricks_cli.sh
        displayName: 'Install Databricks CLI'
        env:
          DATABRICKS_HOST: $(DATABRICKS_HOST)
          DATABRICKS_CLIENT_ID: $(Databricks-Spn-MarketingData-ClientId)
          DATABRICKS_CLIENT_SECRET: $(Databricks-Spn-MarketingData-SecretValue)

      - bash: |
          bash devops/scripts/start_db_cluster.sh ${{ parameters.databricksClusterId }} ${{ parameters.target }}
        name: start_test_cluster
        displayName: Start the testing cluster

      - bash: |
          export DATABRICKS_CLUSTER_ID="${{ parameters.databricksClusterId }}"
          echo "Running ${{ parameters.testType }} tests on Databricks cluster $DATABRICKS_CLUSTER_ID for target ${{ parameters.target }}..."
          if [ "${{ parameters.testType }}" = "unit" ]; then
            TEST_PATH="tests/unit/"
            echo "Running UNIT tests from: $TEST_PATH"
          elif [ "${{ parameters.testType }}" = "integration" ]; then
            TEST_PATH="tests/integration/"
            echo "Running INTEGRATION tests from: $TEST_PATH"
          else
            TEST_PATH="tests/"
            echo "Running ALL tests from: $TEST_PATH"
          fi

          poetry run pytest $TEST_PATH -v --junitxml=junit/test-results.xml
        name: run_tests
        displayName: Run Python ${{ parameters.testType }} Tests
        continueOnError: ${{ parameters.continueOnError }}
        env:
          DATABRICKS_HOST: $(DATABRICKS_HOST)
          DATABRICKS_CLIENT_ID: $(Databricks-Spn-MarketingData-ClientId)
          DATABRICKS_CLIENT_SECRET: $(Databricks-Spn-MarketingData-SecretValue)

      - task: PublishTestResults@2
        condition: succeededOrFailed()
        inputs:
          testResultsFiles: 'junit/test-results.xml'
          testRunTitle: 'Python ${{ parameters.testType }} Tests'
          mergeTestResults: true
        displayName: 'Publish test results'

      - script: |
          echo "Linting Python code..."
          if [ "${{ parameters.continueOnError }}" = "true" ]; then
            poetry run ruff check || echo "WARNING: Formatting or linting issues"
          else
            if [ -n "${SYSTEM_PULLREQUEST_TARGETBRANCH:-}" ]; then
              TARGET_BRANCH="${SYSTEM_PULLREQUEST_TARGETBRANCH#refs/heads/}"
              git fetch origin "$TARGET_BRANCH" --depth=1
              mapfile -t CHANGED_PYTHON_FILES < <(
                git diff --name-only --diff-filter=ACMR "origin/$TARGET_BRANCH"...HEAD -- "*.py"
              )
            elif git rev-parse HEAD~1 >/dev/null 2>&1; then
              mapfile -t CHANGED_PYTHON_FILES < <(
                git diff --name-only --diff-filter=ACMR HEAD~1 HEAD -- "*.py"
              )
            else
              mapfile -t CHANGED_PYTHON_FILES < <(git ls-files "*.py")
            fi

            if [ "${#CHANGED_PYTHON_FILES[@]}" -eq 0 ]; then
              echo "No changed Python files to lint."
              exit 0
            fi

            printf 'Changed Python files to lint:\n'
            printf '%s\n' "${CHANGED_PYTHON_FILES[@]}"
            poetry run ruff check "${CHANGED_PYTHON_FILES[@]}"
          fi
        displayName: 'Lint code'
        condition: |
          and(
            succeededOrFailed(),
            or(
              eq('${{ parameters.testType }}', 'unit'),
              eq('${{ parameters.testType }}', 'all')
            )
          )
        continueOnError: ${{ parameters.continueOnError }}

      # - task: PublishCodeCoverageResults@1
