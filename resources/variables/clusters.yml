_base_cluster_shared: &base_cluster_shared
  spark_version: 15.4.x-scala2.12
  spark_conf:
    spark.hadoop.fs.gs.auth.service.account.private.key.id: "{{secrets/mktg_gcp/mktg-gcp-service-account-private-key-id}}"
    spark.hadoop.fs.gs.auth.service.account.private.key: "{{secrets/mktg_gcp/mktg-gcp-service-account-private-key}}"
    spark.hadoop.google.cloud.auth.service.account.enable: "true"
    spark.hadoop.fs.gs.project.id: firebasereiss-dmk-prod
    spark.hadoop.fs.gs.auth.service.account.email: azure-databricks@big-query-156009.iam.gserviceaccount.com
    spark.databricks.sql.initial.catalog.name: ${var.mktgdata_catalog}
    credentials: "{{secrets/mktg_gcp/mktg-gcp-service-account-b64-encoded}}"
  azure_attributes:
    first_on_demand: 1
    availability: SPOT_WITH_FALLBACK_AZURE
    spot_bid_max_price: -1
  spark_env_vars:
    CURRENT_ENV: ${var.environment_name}
    GOOGLE_CLOUD_PROJECT: big-query-156009
    USER_SCHEMA: ${var.user_schema}
  enable_elastic_disk: true
  workload_type:
    clients:
      notebooks: true
      jobs: true
  is_single_node: false

_base_cluster_config: &base_cluster
  <<: *base_cluster_shared
  policy_id: ${var.job_cluster_policy_id}

_base_cluster_config_fixed: &base_cluster_fixed_standard
  <<: *base_cluster_shared
  policy_id: ${var.job_cluster_policy_id_fixed}
  runtime_engine: STANDARD

_base_cluster_config_standard: &base_cluster_standard
  <<: *base_cluster
  runtime_engine: STANDARD

_base_cluster_config_photon: &base_cluster_photon
  <<: *base_cluster
  runtime_engine: PHOTON

_feature_store_ml_cluster_config: &feature_store_ml_cluster
  <<: *base_cluster
  spark_version: 17.3.x-cpu-ml-scala2.13
  runtime_engine: STANDARD
  # Access mode is fixed by the workspace cluster policy. Do not override it here:
  # DEV policies currently enforce SINGLE_USER and reject USER_ISOLATION.

variables:
  job_clusters_config:
    description: Complete job clusters configuration
    default:
      - job_cluster_key: next_ads_job_cluster_D8ads_v5_2_2
        new_cluster:
          <<: *base_cluster_standard
          node_type_id: Standard_D8ads_v5
          driver_node_type_id: Standard_D4ads_v5
          autoscale:
            min_workers: 2
            max_workers: 2
      - job_cluster_key: next_ads_job_cluster_D16ads_v5_4_4
        new_cluster:
          <<: *base_cluster_standard
          node_type_id: Standard_D16ads_v5
          driver_node_type_id: Standard_D4ads_v5
          autoscale:
            min_workers: 4
            max_workers: 4
      - job_cluster_key: next_ads_job_cluster_D16ads_v5_2_2
        new_cluster:
          <<: *base_cluster_standard
          node_type_id: Standard_D16ads_v5
          driver_node_type_id: Standard_D4ads_v5
          autoscale:
            min_workers: 2
            max_workers: 2
      - job_cluster_key: next_ads_job_cluster_D16ads_v5_3_3
        new_cluster:
          <<: *base_cluster_standard
          node_type_id: Standard_D16ads_v5
          driver_node_type_id: Standard_D16ads_v5
          autoscale:
            min_workers: 3
            max_workers: 3
      - job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        new_cluster:
          <<: *base_cluster_standard
          node_type_id: Standard_D4ads_v5
          driver_node_type_id: Standard_D4ads_v5
          autoscale:
            min_workers: 1
            max_workers: 1
      - job_cluster_key: next_ads_job_cluster_D32ads_v5_4_4_photon
        new_cluster:
          <<: *base_cluster_photon
          node_type_id: Standard_D32ads_v5
          driver_node_type_id: Standard_D32ads_v5
          autoscale:
            min_workers: 4
            max_workers: 4
      - job_cluster_key: next_ads_job_cluster_D32ads_v5_1_4
        new_cluster:
          <<: *base_cluster_standard
          node_type_id: Standard_D32ads_v5
          driver_node_type_id: Standard_D32ads_v5
          autoscale:
            min_workers: 1
            max_workers: 4
      - job_cluster_key: next_ads_job_cluster_E4ds_v5_4
        new_cluster:
          <<: *base_cluster_fixed_standard
          node_type_id: Standard_E4ds_v5
          driver_node_type_id: Standard_D32ads_v5
          num_workers: 4
      - job_cluster_key: next_ads_job_cluster_E16ds_v5_4
        new_cluster:
          <<: *base_cluster_fixed_standard
          node_type_id: Standard_E16ds_v5
          driver_node_type_id: Standard_D32ads_v5
          num_workers: 4
  feature_store_job_clusters_config:
    description: Feature-store-only job clusters configuration
    default:
      - job_cluster_key: next_ads_feature_store_ml_cluster_D4ads_v5_1_1
        new_cluster:
          <<: *feature_store_ml_cluster
          node_type_id: Standard_D4ads_v5
          driver_node_type_id: Standard_D4ads_v5
          autoscale:
            min_workers: 1
            max_workers: 1
  theme_affinity_gpu_train_job_clusters_config:
    description: GPU ML cluster for Theme Affinity local XGBoost training
    default:
      - job_cluster_key: next_ads_job_cluster_theme_affinity_gpu_xgboost_train
        new_cluster:
          policy_id: ${var.job_cluster_policy_id}
          kind: CLASSIC_PREVIEW
          spark_version: 18.1.x-scala2.13
          use_ml_runtime: true
          is_single_node: true
          node_type_id: Standard_NV36ads_A10_v5
          spark_conf:
            spark.databricks.sql.initial.catalog.name: ${var.mktgdata_catalog}
          spark_env_vars:
            CURRENT_ENV: ${var.environment_name}
            GOOGLE_CLOUD_PROJECT: big-query-156009
            PYSPARK_PYTHON: /databricks/python3/bin/python3
  pipeline_clusters_config:
    description: Cluster configuration for Lakeflow pipelines
    default:
      - label: default
        node_type_id: Standard_D32ads_v5
        driver_node_type_id: Standard_D16ds_v4
        custom_tags:
          Recharge Cost Centre: C9871
          Recharge Department: MARKETING DATA
          Showback Cost Centre: C9871
          Showback Team: MARKETING DATA
          Team: marketing_job
        policy_id: ${var.job_cluster_lp_policy_id}
        autoscale:
          min_workers: 2
          max_workers: 6
          mode: ENHANCED
