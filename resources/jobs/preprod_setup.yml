# PREPROD table setup job.
# Deployed only to PREPROD so release-validation tables are created
# in marketingdata_prod.ds_sandbox before smoke tasks are run.
nextads_preprod_setup_config: &nextads_preprod_setup_config
  mktg_next_uk_nextads_preprod_setup:
    name: mktg_next_uk_nextads_preprod_setup
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    timeout_seconds: 3600
    tasks:
      - task_key: create_tables
        spark_python_task:
          python_file: ../../scripts/table_operations/create_tables.py
          parameters:
            - --client
            - next_uk
            - --job_env
            - ${var.job_parameter_environment_name}
            - --log_level
            - INFO
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.shared_libraries}
        timeout_seconds: 3600

targets:
  PREPROD:
    resources:
      jobs:
        <<: *nextads_preprod_setup_config
