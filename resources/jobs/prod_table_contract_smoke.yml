# Read-only PROD table contract smoke job.
# Deployed only to PROD. It validates configured write tables against repo SQL
# contracts without reading rows or changing output tables.
nextads_prod_table_contract_smoke_config: &nextads_prod_table_contract_smoke_config
  mktg_next_uk_nextads_prod_table_contract_smoke:
    name: mktg_next_uk_nextads_prod_table_contract_smoke
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    email_notifications:
      on_failure: ${var.data_team_notification_emails}
    notification_settings:
      no_alert_for_skipped_runs: true
      no_alert_for_canceled_runs: true
    timeout_seconds: 1800
    tasks:
      - task_key: table_contract_smoke
        spark_python_task:
          python_file: ../../scripts/smoke/prod_table_contract_smoke.py
          parameters:
            - --client
            - next_uk
            - --job_env
            - ${var.job_parameter_environment_name}
            - --log_level
            - INFO
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.shared_libraries}
        timeout_seconds: 1800

targets:
  PROD:
    resources:
      jobs:
        <<: *nextads_prod_table_contract_smoke_config
