mktg_next_uk_nextads_realtime_inputs_config: &mktg_next_uk_nextads_realtime_inputs_config
  mktg_next_uk_nextads_realtime_inputs_cicd:
    name: mktg_next_uk_nextads_realtime_inputs
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    email_notifications:
      on_failure: ${var.data_team_notification_emails}
    notification_settings:
      no_alert_for_skipped_runs: true
      no_alert_for_canceled_runs: true
    schedule:
      quartz_cron_expression: 0 0 18 * * ?
      timezone_id: Europe/London
    timeout_seconds: 10800
    tasks:
      - task_key: viewed_bought
        spark_python_task:
          python_file: ../../jobs/realtime/viewed_bought.py
          parameters:
            - --client
            - "next_uk"
            - --job_env
            - ${var.job_parameter_environment_name}
        job_cluster_key: next_ads_job_cluster_D32ads_v5_1_4
        libraries: ${var.shared_libraries}
        max_retries: 2
        timeout_seconds: 10800

targets:
  SANDBOX:
    resources:
      jobs:
        <<: *mktg_next_uk_nextads_realtime_inputs_config
  DEV:
    resources:
      jobs:
        <<: *mktg_next_uk_nextads_realtime_inputs_config
  DEV_INTEGRATION:
    resources:
      jobs:
        <<: *mktg_next_uk_nextads_realtime_inputs_config
  PREPROD:
    resources:
      jobs:
        <<: *mktg_next_uk_nextads_realtime_inputs_config
  PROD:
    resources:
      jobs:
        <<: *mktg_next_uk_nextads_realtime_inputs_config
