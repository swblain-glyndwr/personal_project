theme_affinity_quality_monitor_setup_config: &theme_affinity_quality_monitor_setup_config
  mktg_next_uk_nextads_theme_affinity_quality_monitor_setup:
    name: mktg_next_uk_nextads_theme_affinity_quality_monitor_setup
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
      domain: theme_affinity
      job_type: quality_monitor_setup
    timeout_seconds: 1800
    parameters:
      - name: table_name
        default: ${var.mktgdata_catalog}.${var.user_schema}.next_uk_nextads_theme_affinity_predict_ranked
      - name: output_schema_name
        default: ${var.mktgdata_catalog}.${var.user_schema}
      - name: assets_dir
        default: ${workspace.root_path}/quality_monitors/theme_affinity_predict_ranked
      - name: timestamp_col
        default: reference_date
      - name: granularities
        default: 1 day
      - name: slicing_exprs
        default: repurchase_stage,GmaName
      - name: run_refresh
        default: "false"
    tasks:
      - task_key: setup_quality_monitor
        spark_python_task:
          python_file: ../../scripts/theme_affinity/setup_quality_monitor.py
          parameters:
            - --client
            - next_uk
            - --job_env
            - ${var.job_parameter_environment_name}
            - --table_name
            - "{{job.parameters.table_name}}"
            - --output_schema_name
            - "{{job.parameters.output_schema_name}}"
            - --assets_dir
            - "{{job.parameters.assets_dir}}"
            - --timestamp_col
            - "{{job.parameters.timestamp_col}}"
            - --granularities
            - "{{job.parameters.granularities}}"
            - --slicing_exprs
            - "{{job.parameters.slicing_exprs}}"
            - --run_refresh
            - "{{job.parameters.run_refresh}}"
            - --log_level
            - INFO
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.theme_affinity_libraries}
        timeout_seconds: 1800

targets:
  SANDBOX:
    resources:
      jobs:
        <<: *theme_affinity_quality_monitor_setup_config
  DEV:
    resources:
      jobs:
        <<: *theme_affinity_quality_monitor_setup_config
  DEV_INTEGRATION:
    resources:
      jobs:
        <<: *theme_affinity_quality_monitor_setup_config
  PREPROD:
    resources:
      jobs:
        <<: *theme_affinity_quality_monitor_setup_config
