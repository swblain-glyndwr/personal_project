theme_affinity_model_monitor_config: &theme_affinity_model_monitor_config
  mktg_next_uk_nextads_theme_affinity_model_monitor:
    name: mktg_next_uk_nextads_theme_affinity_model_monitor
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
      domain: theme_affinity
      job_type: model_monitor
    timeout_seconds: 1800
    parameters:
      - name: baseline_table
        default: ""
      - name: candidate_table
        default: ""
      - name: sample_limit
        default: "100000"
    tasks:
      - task_key: monitor_model
        spark_python_task:
          python_file: ../../scripts/theme_affinity/monitor_model.py
          parameters:
            - --client
            - next_uk
            - --job_env
            - ${var.job_parameter_environment_name}
            - --baseline_table
            - "{{job.parameters.baseline_table}}"
            - --candidate_table
            - "{{job.parameters.candidate_table}}"
            - --sample_limit
            - "{{job.parameters.sample_limit}}"
            - --log_level
            - INFO
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.theme_affinity_libraries}
        timeout_seconds: 1800

targets:
  SANDBOX:
    resources:
      jobs:
        <<: *theme_affinity_model_monitor_config
  DEV:
    resources:
      jobs:
        <<: *theme_affinity_model_monitor_config
  PREPROD:
    resources:
      jobs:
        <<: *theme_affinity_model_monitor_config
  PROD:
    resources:
      jobs:
        <<: *theme_affinity_model_monitor_config
