resources:
  jobs:
    mktg_next_uk_nextads_results_cicd: # TODO temp name to avoid clash with existing job
      name: mktg_next_uk_nextads_results_cicd # TODO change back to {{job.name}}
      run_as:
        service_principal_name: ${var.run_as_SPN_name}
      queue:
        enabled: true
      job_clusters: ${var.job_clusters_config}
      tags:
        deployed_at: ${var.deploy_timestamp}
        git_commit: ${var.git_commit_sha}
        git_branch: ${var.git_branch}
        deployed_by: ${var.deployed_by}
        department: marketing
        project: nextads
      email_notifications:
        on_failure: ${var.notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      schedule:
        quartz_cron_expression: 0 15 7 * * ?
        timezone_id: Europe/London
      tasks:
        - task_key: results
          spark_python_task:
            python_file: ../../scripts/results.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_8
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 36000
        - task_key: results_agg
          depends_on:
            - task_key: results
          spark_python_task:
            python_file: ../../scripts/results_agg.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_8
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 3600
        - task_key: results_performance_check
          depends_on:
            - task_key: results_agg
          spark_python_task:
            python_file: ../../scripts/results_performance_checks.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_8
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 3600
        - task_key: results_to_bigquery
          depends_on:
            - task_key: results_agg
          spark_python_task:
            python_file: ../../scripts/results_to_bigquery.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_8
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 3600
        - task_key: results_top_ads
          depends_on:
            - task_key: results_performance_check
          spark_python_task:
            python_file: ../../scripts/results_top_ads_by_location.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_8
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 3600
