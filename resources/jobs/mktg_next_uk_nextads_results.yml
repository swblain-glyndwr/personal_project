resources:
  jobs:
    mktg_next_uk_nextads_results_cicd: # TODO temp name to avoid clash with existing job
      name: mktg_next_uk_nextads_results_cicd # TODO change back to {{job.name}}
      run_as:
        service_principal_name: ${var.run_as_SPN_name}
      queue:
        enabled: true
      parameters:
        - name: job_name
          default: mktg_next_uk_nextads_results_cicd #"{{job.name}}" # TODO swap back to parameter
      # job_clusters: ${var.job_clusters_config}
      email_notifications:
        on_failure:
          - tom_corke@next.co.uk
          - mktg_data_support@next.co.uk
          - edward_taylor@next.co.uk
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      schedule:
        quartz_cron_expression: 0 15 7 * * ?
        timezone_id: Europe/London
      tasks:
        - task_key: results
          spark_python_task:
            python_file: ../../scripts/results.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_uk_nextads_results
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 21600
        - task_key: results_agg
          depends_on:
            - task_key: results
          spark_python_task:
            python_file: ../../scripts/results_agg.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_uk_nextads_results
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 3600
        - task_key: results_performance_check
          depends_on:
            - task_key: results_agg
          spark_python_task:
            python_file: ../../scripts/results_performance_checks.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_uk_nextads_results
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 3600
        - task_key: results_to_bigquery
          depends_on:
            - task_key: results_agg
          spark_python_task:
            python_file: ../../scripts/results_to_bigquery.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_uk_nextads_results
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 3600
        - task_key: results_top_ads
          depends_on:
            - task_key: results_performance_check
          spark_python_task:
            python_file: ../../scripts/results_top_ads_by_location.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_uk_nextads_results
          libraries:
            - whl: /Volumes/marketingdata_prod/ds_sandbox/ds_volume/dslib/dsutils/dsutils-0.1.8-py3-none-any.whl
          timeout_seconds: 3600
      job_clusters:
        - job_cluster_key: next_uk_nextads_results
          new_cluster:
            cluster_name: ""
            spark_version: 15.4.x-scala2.12
            spark_conf:
              spark.hadoop.fs.gs.auth.service.account.private.key.id: "{{secrets/mktg_gcp/mktg-gcp-service-account-private-key-id}}"
              spark.hadoop.fs.gs.auth.service.account.private.key: "{{secrets/mktg_gcp/mktg-gcp-service-account-private-key}}"
              spark.hadoop.google.cloud.auth.service.account.enable: "true"
              spark.hadoop.fs.gs.project.id: big-query-156009
              spark.hadoop.fs.gs.auth.service.account.email: azure-databricks@big-query-156009.iam.gserviceaccount.com
              spark.databricks.sql.initial.catalog.name: marketingdata_prod
              credentials: "{{secrets/mktg_gcp/mktg-gcp-service-account-b64-encoded}}"
            azure_attributes:
              first_on_demand: 1
              availability: SPOT_WITH_FALLBACK_AZURE
              spot_bid_max_price: -1
            node_type_id: Standard_D16ads_v5
            driver_node_type_id: Standard_D16ads_v5
            custom_tags:
              Recharge Cost Centre: C9871
              Team: marketing_job
            spark_env_vars:
              CURRENT_ENV: prod
              GOOGLE_CLOUD_PROJECT: big-query-156009
            enable_elastic_disk: true
            workload_type:
              clients:
                notebooks: true
                jobs: true
            data_security_mode: DATA_SECURITY_MODE_DEDICATED
            runtime_engine: STANDARD
            kind: CLASSIC_PREVIEW
            is_single_node: false
            num_workers: 3
