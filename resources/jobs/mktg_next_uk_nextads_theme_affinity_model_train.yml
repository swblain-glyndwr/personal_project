theme_affinity_model_train_config: &theme_affinity_model_train_config
  mktg_next_uk_nextads_theme_affinity_model_train:
    name: mktg_next_uk_nextads_theme_affinity_model_train
    queue:
      enabled: true
    job_clusters: ${var.theme_affinity_gpu_train_job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
      domain: theme_affinity
      job_type: model_train_gpu_xgboost
    timeout_seconds: 14400
    tasks:
      - task_key: train_gpu_xgboost_model
        spark_python_task:
          python_file: ../../scripts/theme_affinity/train_gpu_xgboost_model.py
          parameters:
            - --client
            - next_uk
            - --job_env
            - ${var.job_parameter_environment_name}
            - --log_level
            - INFO
            - --alias_suffix
            - gpu_xgboost
        job_cluster_key: next_ads_job_cluster_theme_affinity_gpu_xgboost_train
        libraries: ${var.theme_affinity_libraries}
        timeout_seconds: 14400

targets:
  DEV:
    resources:
      jobs:
        <<: *theme_affinity_model_train_config
  DEV_INTEGRATION:
    resources:
      jobs:
        <<: *theme_affinity_model_train_config
