# DEV integration table setup job.
# Deployed only to DEV_INTEGRATION so shared integration tables are created
# before smoke tasks such as load_control_sheet are run.
nextads_dev_integration_setup_config: &nextads_dev_integration_setup_config
  mktg_next_uk_nextads_dev_integration_setup:
    name: mktg_next_uk_nextads_dev_integration_setup
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    timeout_seconds: 3600
    tasks:
      - task_key: create_tables
        spark_python_task:
          python_file: ../../scripts/table_operations/create_tables.py
          parameters:
            - --client
            - next_uk
            - --job_env
            - ${var.job_parameter_environment_name}
            - --log_level
            - INFO
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.shared_libraries}
        timeout_seconds: 3600

  mktg_next_uk_nextads_dev_integration_migrate:
    name: mktg_next_uk_nextads_dev_integration_migrate
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    timeout_seconds: 3600
    tasks:
      - task_key: recreate_tables
        spark_python_task:
          python_file: ../../scripts/table_operations/create_tables.py
          parameters:
            - --client
            - next_uk
            - --job_env
            - ${var.job_parameter_environment_name}
            - --log_level
            - INFO
            - --droptables
            - "True"
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.shared_libraries}
        timeout_seconds: 3600

  mktg_next_uk_nextads_dev_integration_alter:
    name: mktg_next_uk_nextads_dev_integration_alter
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    timeout_seconds: 3600
    tasks:
      - task_key: alter_tables
        spark_python_task:
          python_file: ../../scripts/table_operations/create_tables.py
          parameters:
            - --client
            - next_uk
            - --job_env
            - ${var.job_parameter_environment_name}
            - --log_level
            - INFO
            - --altertables
            - "True"
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.shared_libraries}
        timeout_seconds: 3600

targets:
  DEV_INTEGRATION:
    resources:
      jobs:
        <<: *nextads_dev_integration_setup_config
