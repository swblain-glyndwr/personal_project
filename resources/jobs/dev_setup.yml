# Personal DEV table setup job.
# Deployed only to DEV so individual developer schemas can be created and populated
# through the bundle without running commands manually in a Databricks terminal.
nextads_dev_setup_config: &nextads_dev_setup_config
  mktg_next_uk_nextads_dev_setup:
    name: mktg_next_uk_nextads_dev_setup
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    timeout_seconds: 21600
    tasks:
      - task_key: populate_dev_tables
        spark_python_task:
          python_file: ../../scripts/table_operations/setup_dev_tables.py
          parameters:
            - --standard
        job_cluster_key: next_ads_job_cluster_D32ads_v5_4_4_photon
        libraries: ${var.shared_libraries}
        timeout_seconds: 21600

targets:
  DEV:
    resources:
      jobs:
        <<: *nextads_dev_setup_config
