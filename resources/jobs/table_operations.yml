# Manual table maintenance job. Defaults are inert; mutating/destructive runs
# must override dry_run and the relevant confirmation parameter at run time.
nextads_table_operations_config: &nextads_table_operations_config
  mktg_next_uk_nextads_table_operations:
    name: mktg_next_uk_nextads_table_operations
    queue:
      enabled: true
    parameters:
      - name: operation
        default: create_missing_tables
      - name: client
        default: next_uk
      - name: job_env
        default: ${var.job_parameter_environment_name}
      - name: catalog
        default: ${var.mktgdata_catalog}
      - name: schema
        default: ${var.user_schema}
      - name: tables
        default: ""
      - name: confirm_mutating
        default: "false"
      - name: confirm_destructive
        default: "false"
      - name: dry_run
        default: "true"
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
      purpose: table_operations
    timeout_seconds: 3600
    tasks:
      - task_key: table_operations
        spark_python_task:
          python_file: ../../jobs/table_operations/table_operations.py
          parameters:
            - --operation
            - "{{job.parameters.operation}}"
            - --client
            - "{{job.parameters.client}}"
            - --job_env
            - "{{job.parameters.job_env}}"
            - --catalog
            - "{{job.parameters.catalog}}"
            - --schema
            - "{{job.parameters.schema}}"
            - --tables
            - "{{job.parameters.tables}}"
            - --confirm_mutating
            - "{{job.parameters.confirm_mutating}}"
            - --confirm_destructive
            - "{{job.parameters.confirm_destructive}}"
            - --dry_run
            - "{{job.parameters.dry_run}}"
            - --log_level
            - INFO
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.shared_libraries}
        timeout_seconds: 3600

