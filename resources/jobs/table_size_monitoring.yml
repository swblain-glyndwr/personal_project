# table size monitoring job configuration that runs only in DEV
mktg_next_uk_nextads_table_monitoring_config: &mktg_next_uk_nextads_table_monitoring_config
  mktg_next_uk_nextads_table_monitoring:
    name: mktg_next_uk_nextads_table_monitoring
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    schedule:
      quartz_cron_expression: 0 0 18 * * ?
      timezone_id: Europe/London
    timeout_seconds: 3600
    tasks:
      - task_key: calculate_table_sizes
        spark_python_task:
          python_file: ../../scripts/table_operations/calculate_table_sizes.py
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.shared_libraries}
        timeout_seconds: 3600

targets:
  DEV:
    variables:
      user_schema: ds_sandbox
    resources:
      jobs:
        <<: *mktg_next_uk_nextads_table_monitoring_config