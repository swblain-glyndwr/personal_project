# Read-only PREPROD dependency smoke job.
# Deployed only to PREPROD. It validates config, schemas and table metadata
# without reading rows or changing output tables by default.
nextads_preprod_dependency_smoke_config: &nextads_preprod_dependency_smoke_config
  mktg_next_uk_nextads_preprod_dependency_smoke:
    name: mktg_next_uk_nextads_preprod_dependency_smoke
    queue:
      enabled: true
    job_clusters: ${var.job_clusters_config}
    tags:
      deployed_at: ${var.deploy_timestamp}
      git_commit: ${var.git_commit_sha}
      git_branch: ${var.git_branch}
      deployed_by: ${var.deployed_by}
      department: marketing
      project: nextads
    timeout_seconds: 1800
    tasks:
      - task_key: dependency_smoke
        spark_python_task:
          python_file: ../../scripts/smoke/preprod_dependency_smoke.py
          parameters:
            - --job_env
            - ${var.job_parameter_environment_name}
            - --sample_read_count
            - "0"
            - --log_level
            - INFO
        job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
        libraries: ${var.shared_libraries}
        timeout_seconds: 1800

targets:
  PREPROD:
    resources:
      jobs:
        <<: *nextads_preprod_dependency_smoke_config
