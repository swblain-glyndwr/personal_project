resources:
  jobs:
    mktg_next_uk_nextads_cicd: # TODO temp name to avoid clash with existing job
      name: mktg_next_uk_nextads_cicd # TODO change back to {{job.name}}
      run_as:
        service_principal_name: ${var.run_as_SPN_name}
      queue:
        enabled: true
      job_clusters: ${var.job_clusters_config}
      tags:
        deployed_at: ${var.deploy_timestamp}
        git_commit: ${var.git_commit_sha}
        git_branch: ${var.git_branch}
        deployed_by: ${var.deployed_by}
        department: marketing
        project: nextads
      email_notifications:
        on_failure: ${var.notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      schedule:
        quartz_cron_expression: 0 0 18 * * ?
        timezone_id: Europe/London
      timeout_seconds: 21600 # required by Engineering at job level as Monitoring Dashboard doesnt handle for_each_task type
      tasks:
        - task_key: assign_customer_cells
          spark_python_task:
            python_file: ../../scripts/assign_customer_cells.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --refresh_control_date
              - "2026-01-08"
          job_cluster_key: next_ads_job_cluster_D8ads_v5_2_2
          libraries: ${var.shared_libraries_wheel_only}
          timeout_seconds: 7200
        - task_key: combine_customer_cells
          depends_on:
            - task_key: assign_customer_cells
          spark_python_task:
            python_file: ../../scripts/combine_customer_cells.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D8ads_v5_2_2
          libraries: ${var.shared_libraries_wheel_only}
          timeout_seconds: 3600
        - task_key: load_control_sheet
          spark_python_task:
            python_file: ../../scripts/load_control_sheet.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
          libraries: ${var.shared_libraries}
          # adding retry due to transient issues (e.g. Google API)
          max_retries: 1
          min_retry_interval_millis: 300000
          timeout_seconds: 3600
        - task_key: parse_attributes
          depends_on:
            - task_key: load_control_sheet
          spark_python_task:
            python_file: ../../scripts/parse_attributes.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --refresh_attributes_date
              - "2026-01-08"
          job_cluster_key: next_ads_job_cluster_D16ads_v5_4_4
          libraries: ${var.shared_libraries_wheel_only}
          timeout_seconds: 7200
        - task_key: parse_theme_mapping
          depends_on:
            - task_key: parse_attributes
          spark_python_task:
            python_file: ../../scripts/parse_theme_mapping.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --refresh_themes_date
              - "2026-01-19"
          job_cluster_key: next_ads_job_cluster_D16ads_v5_4_4
          libraries: ${var.shared_libraries}
          timeout_seconds: 3600
        - task_key: score_lightweight
          depends_on:
            - task_key: parse_theme_mapping
          spark_python_task:
            python_file: ../../scripts/build_markov_chain.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --refresh_model_date
              - "2026-01-19"
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_4
          libraries: ${var.shared_libraries}
          timeout_seconds: 10800
        - task_key: map_theme_scores_to_ads
          depends_on:
            - task_key: score_lightweight
          spark_python_task:
            python_file: ../../scripts/map_theme_scores_to_ads.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --apply-ad-feedback
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_4
          libraries: ${var.shared_libraries_wheel_only}
          timeout_seconds: 10800
        - task_key: truncate_assignments_latest
          depends_on:
            - task_key: combine_customer_cells
          spark_python_task:
            python_file: ../../scripts/truncate_assignments_latest.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D8ads_v5_2_2
          libraries: ${var.shared_libraries_wheel_only}
          timeout_seconds: 3600
        - task_key: build_page_primary
          depends_on:
            - task_key: truncate_assignments_latest
            - task_key: map_theme_scores_to_ads
          for_each_task:
            inputs: '["SB1","OC1","PH3","PH4","PH5","LP1","LP2","LP3","LP4","LP5","LP6","LP7","LP8","LP9","LP10","LP11","PL1","PL2","PL3","PL4","PL5","PL6","PL7","PL8","PL9","PL10","PL11","PL12","PL13","PL14","PL15","PL16","PL17","PL18","PL19","PL20","PL21","PL22","PL23","PL24","PL25","PL26","PL27","PL28","PL29","PL30","PL31","PL32","PL33","PL34","PL35","PL36","PL37","PL38","PL39","PL40","FY1","FY2","FY3","FY4","FY5","FY6","FY7","FY8","FY9","FY10","FY11","FY12","FY13","FY14","FY15","FY16","FY17","FY18","FY19","FY20","PLX"]'
            concurrency: 30
            task:
              task_key: build_page_primary_iteration
              spark_python_task:
                python_file: ../../scripts/build_page.py
                parameters:
                  - --client
                  - "next_uk"
                  - --job_env
                  - ${var.job_parameter_environment_name}
                  - --location
                  - "{{input}}"
              job_cluster_key: next_ads_job_cluster_D32ads_v5_4_4_photon
              libraries: ${var.shared_libraries_wheel_only}
              max_retries: 2
              min_retry_interval_millis: 5000
              timeout_seconds: 10800
        - task_key: build_page_secondary
          depends_on:
            - task_key: build_page_primary
          for_each_task:
            inputs: '[{"location":"SB2","inherit_basic_from":"SB1"},{"location":"OC2","inherit_basic_from":"OC1"}]'
            concurrency: 2
            task:
              task_key: build_page_secondary_iteration
              spark_python_task:
                python_file: ../../scripts/build_page.py
                parameters:
                  - --client
                  - "next_uk"
                  - --job_env
                  - ${var.job_parameter_environment_name}
                  - --location
                  - "{{input.location}}"
                  - --inherit_basic_from
                  - "{{input.inherit_basic_from}}"
              job_cluster_key: next_ads_job_cluster_D32ads_v5_4_4_photon
              libraries: ${var.shared_libraries_wheel_only}
              max_retries: 2
              min_retry_interval_millis: 5000
              timeout_seconds: 10800
        - task_key: nextads_plp_gs
          depends_on:
            - task_key: build_page_primary
            - task_key: build_page_secondary
          run_if: ALL_DONE
          for_each_task:
            inputs: '[{"client":"next", "territory":"GB"}]'
            concurrency: 2
            task:
              task_key: nextads_plp_gs_iteration
              spark_python_task:
                python_file: ../../scripts/plp_gs.py
                parameters:
                  - --client
                  - "{{input.client}}"
                  - --job_env
                  - ${var.job_parameter_environment_name}
                  - --territory
                  - "{{input.territory}}"
              job_cluster_key: next_ads_job_cluster_D8ads_v5_2_2
              libraries: ${var.shared_libraries}
              timeout_seconds: 1800
        # - task_key: nextads_plp_gs_combiner
        #   depends_on:
        #     - task_key: nextads_plp_gs
        #   spark_python_task:
        #     python_file: ../../scripts/plp_gs_combiner.py
        #     parameters:
        #       - --job_env
        #       - ${var.job_parameter_environment_name}
        #   job_cluster_key: next_ads_job_cluster_D8ads_v5_2_2
        #   libraries: ${var.shared_libraries}
        #   timeout_seconds: 600
        - task_key: QA
          depends_on:
            - task_key: nextads_plp_gs
          spark_python_task:
            python_file: ../../scripts/qa.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D32ads_v5_4_4_photon
          libraries: ${var.shared_libraries_wheel_only}
          timeout_seconds: 3600
        - task_key: viewed_bought
          spark_python_task:
            python_file: ../../scripts/viewed_bought.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_4
          libraries: ${var.shared_libraries_wheel_only_0_1_12}
          timeout_seconds: 10800
