resources:
  jobs:
    mktg_next_uk_nextads_cicd:
      name: mktg_next_uk_nextads_candidate_build
      queue:
        enabled: true
      job_clusters: ${var.job_clusters_config}
      tags:
        deployed_at: ${var.deploy_timestamp}
        git_commit: ${var.git_commit_sha}
        git_branch: ${var.git_branch}
        deployed_by: ${var.deployed_by}
        department: marketing
        project: nextads
      email_notifications:
        on_failure: ${var.data_team_notification_emails}
      notification_settings:
        no_alert_for_skipped_runs: true
        no_alert_for_canceled_runs: true
      schedule:
        quartz_cron_expression: 0 0 18 * * ?
        timezone_id: Europe/London
      timeout_seconds: 21600 # required by Engineering at job level as Monitoring Dashboard doesnt handle for_each_task type
      tasks:
        - task_key: assign_customer_cells
          spark_python_task:
            python_file: ../../scripts/assign_customer_cells.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --refresh_control_date
              - "2026-01-08"
              # - --sample_mode
              # - "True"
          job_cluster_key: next_ads_job_cluster_D32ads_v5_4_4_photon
          libraries: ${var.shared_libraries}
          max_retries: 2
          timeout_seconds: 7200
        - task_key: combine_customer_cells
          depends_on:
            - task_key: assign_customer_cells
          spark_python_task:
            python_file: ../../scripts/combine_customer_cells.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D32ads_v5_4_4_photon
          libraries: ${var.shared_libraries}
          max_retries: 2
          timeout_seconds: 3600
        - task_key: load_control_sheet
          spark_python_task:
            python_file: ../../jobs/nextads_main/load_control_sheet.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
          libraries: ${var.shared_libraries}
          # adding retry due to transient issues (e.g. Google API)
          max_retries: 2
          min_retry_interval_millis: 300000
          timeout_seconds: 3600
        - task_key: load_control_sheet_v2
          spark_python_task:
            python_file: ../../scripts/load_control_sheet_v2.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
          job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
          libraries: ${var.shared_libraries}
          # adding retry due to transient issues (e.g. Google API)
          max_retries: 2
          min_retry_interval_millis: 300000
          timeout_seconds: 3600
        - task_key: parse_attributes
          spark_python_task:
            python_file: ../../jobs/nextads_main/parse_attributes.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --refresh_attributes_date
              - "2026-06-15"
          job_cluster_key: next_ads_job_cluster_D16ads_v5_4_4
          libraries: ${var.shared_libraries}
          max_retries: 2
          timeout_seconds: 7200
        - task_key: parse_theme_mapping
          depends_on:
            - task_key: parse_attributes
          spark_python_task:
            python_file: ../../jobs/nextads_main/parse_theme_mapping.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --refresh_themes_date
              - "2026-06-15"
          job_cluster_key: next_ads_job_cluster_D16ads_v5_4_4
          libraries: ${var.shared_libraries}
          max_retries: 2
          timeout_seconds: 3600
        - task_key: score_lightweight
          depends_on:
            - task_key: parse_theme_mapping
          spark_python_task:
            python_file: ../../scripts/build_markov_chain.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --refresh_model_date
              - "2026-05-11"
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_4
          libraries: ${var.shared_libraries}
          max_retries: 2
          timeout_seconds: 18000
        - task_key: map_theme_scores_to_ads
          depends_on:
            - task_key: score_lightweight
            - task_key: load_control_sheet
          spark_python_task:
            python_file: ../../scripts/map_theme_scores_to_ads.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --apply-ad-feedback
              - --top-ads-per-location
              - "100"
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_4
          libraries: ${var.shared_libraries}
          max_retries: 2
          timeout_seconds: 10800
        - task_key: map_theme_scores_to_ads_v2
          depends_on:
            - task_key: score_lightweight
            - task_key: map_theme_scores_to_ads
            - task_key: load_control_sheet_v2
          spark_python_task:
            python_file: ../../scripts/map_theme_scores_to_ads_v2.py
            parameters:
              - --client
              - "next_uk"
              - --job_env
              - ${var.job_parameter_environment_name}
              - --top-ads-per-page-type
              - "100"
          job_cluster_key: next_ads_job_cluster_D32ads_v5_1_4
          libraries: ${var.shared_libraries}
          max_retries: 2
          timeout_seconds: 10800
        - task_key: trigger_page_build_job
          depends_on:
            - task_key: combine_customer_cells
            - task_key: map_theme_scores_to_ads_v2
          spark_python_task:
            python_file: ../../scripts/trigger_databricks_job.py
            parameters:
              - --job-id
              - ${resources.jobs.mktg_next_uk_nextads_page_build_cicd.id}
              - --job-name
              - "mktg_next_uk_nextads_page_build"
              - --fail-on-submit-error
          job_cluster_key: next_ads_job_cluster_D4ads_v5_1_1
          libraries: ${var.shared_libraries}
          max_retries: 2
          timeout_seconds: 3600
