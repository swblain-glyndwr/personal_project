default:
  ranking_model:
    model_uri: models:/marketingdata_prod.ds_sandbox.nextads_hackathon_model/1
    model_name: theme_affinity_ranker
    registered_model_name: nextads_theme_affinity_ranker
    experiment_path: "@format /Shared/mlflow/nextads/{this.job_env}/experiments/theme_affinity_ranker"
    train_ratio: 0.75
    test_ratio: 0.15
    training_backend: spark_xgb_ranker
    spark_num_workers: 4
    num_boost_round: 200
    early_stopping_rounds: 20
    training_frame:
      max_accounts: 50000
      max_candidates_per_account: 256
      max_rows: 15000000
      max_pandas_rows: 15000000
      rank_filter_threshold: 256
      random_seed: 42
      min_positive_group_fraction: 1.0
      activity_bucket_count: 4
      retrieval_bucket_count: 4
      rank_band_edges:
        - 20
        - 100
        - 256
      sample_strata_columns:
        - label_bucket
        - repurchase_stage
        - GmaName
        - user_total_views_bucket
        - num_retrieval_methods_bucket
      candidate_rank_band_fractions:
        rank_001_020: 1.0
        rank_021_100: 0.75
        rank_101_256: 0.5
        rank_gt_256: 0.25
        rank_missing: 0.5
      profile_top_n: 25
    monitoring:
      sample_limit: 100000
      numeric_psi_warn_threshold: 0.1
      numeric_psi_fail_threshold: 0.25
      categorical_warn_threshold: 0.1
      categorical_fail_threshold: 0.25
      categorical_cols:
        - repurchase_stage
        - GmaName
        - theme_clean
        - simple_rules_rank_band
        - user_total_views_bucket
        - num_retrieval_methods_bucket
    predict_rank_filter_threshold: 100
    xgb_params:
      objective: rank:pairwise
      eval_metric: ndcg@5
      tree_method: hist
      device: cpu
      learning_rate: 0.05
      max_depth: 6
      min_child_weight: 1
      subsample: 0.8
      colsample_bytree: 0.8
      seed: 42
      verbosity: 1
    high_repurchase_penalty: 0.25
    high_repurchase_manual_themes:
      - homesofas
      - homediningroom
      - homecurtainsandblinds
      - mensouterwear
      - womensouterwear
      - reisscoatsjacketswomens
      - reisscoatsjacketsmens
      - womensbarbourcoatsjackets
      - mensbarbourcoatsjackets
      - laurenralphlaurenouterwear
      - mensuperdrycoatsjackets
      - womensuperdrycoatsjackets
      - mensjoulescoatsjackets
      - womensjoulescoatsjackets
      - seasonscoach
      - seasonsmulberry
      - beautyelectricals
      - dyson
      - ghd
      - cloudnine
      - babyliss
    predict_table_cols:
      - account_number
      - theme
      - month
      - baskets_behavior__recency_rank
      - prediction
    model_input_cols:
      - month
      - algo_baskets1__cs_top10
      - algo_baskets5__freq12_top10
      - algo_baskets5__cs_top10
      - algo_baskets5__freq12_norm_top10
      - algo_views5__cs_top10
      - views_behavior__recency
      - views_behavior__frequency
      - views_behavior__recency_rank
      - baskets_behavior__frequency
      - num_retrieval_methods
      - repurchase_ratio
      - repurchase_stage
      - user_total_views
      - user_view_to_atb_rate
      - GmaName
      - views_ly_7
      - views_ly_30
      - baskets_ly_7
      - baskets_ly_30
      - trending_7x30
      - simple_rules_rank
